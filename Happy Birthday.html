<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sharmila</title>
    <!-- Make sure these paths match your actual folder structure -->
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Start Celebration</button>
            </div>
        </div>
    </div>

    <!-- Music Player -->
    <audio class="song" controls loop>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <canvas id="confetti"></canvas>

    <div class="container pt-5">
        <div class="row">
            <!-- Top Banner -->
            <div class="col-12 col-xl-6 mx-auto">
                <img src="img/banner.png" alt="Happy Birthday" class="img-fluid">
            </div>

            <!-- Name Header -->
            <div class="col-12 text-center">
                <div id="name" class="area">Sharmila</div>
            </div>

            <!-- Typing Animation Section -->
            <div class="col-12 text-center">
                <div class="type-wrap">
                    <!-- The strings below are what the JS will type out -->
                    <div id="typed-strings" class="typing" style="display: none;">
                        <h2>Happy Birthday <i>Sharmila</i></h2>
                        <h2>Have a wonderful day</h2>
                        <h2>Filled with joy and happiness.</h2>
                    </div>
                    <span id="typed" style="white-space:pre;"></span>
                </div>
            </div>

            <!-- Birthday Cake -->
            <div class="col-12 col-xl-6 mx-auto">
                <img src="img/cake.svg" alt="Cake" class="img-fluid">
            </div>
        </div>
    </div>

    <!-- Decoration -->
    <img src="img/Balloon-Border.png" class="balloon-border" width="100%">

    <!-- Scripts -->
    <script src="js/snowflakes.js"></script>
    <script src="js/jquery.js"></script>
    <script src="js/typed.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
